services:
  db:
    image: postgres:15-alpine
    container_name: Allan_Aleson_db
    environment:
      POSTGRES_USER: fatec_user
      POSTGRES_PASSWORD: fatec_password
      POSTGRES_DB: todolist
    volumes:
      - allan_aleson_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: allan_aleson_api
    restart: always
    environment:
      DB_HOST: db
      DB_USER: fatec_user
      DB_PASSWORD: fatec_password
      DB_NAME: todolist
    depends_on:
      - db

  web:
    build: ./frontend
    container_name: allan_aleson_web
    ports:
      - "8011:80"
    depends_on:
      - api

volumes:
  allan_aleson_data:
