<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATEC ToDo List</title>
    <style>
        :root {
            --bg: #f5efe6;
            --panel: #fffaf2;
            --line: #d7c8b0;
            --accent: #1f6f5f;
            --accent-dark: #154d42;
            --text: #2a241d;
            --danger: #8f2d2d;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Georgia, serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, #fff7e8 0, transparent 32%),
                linear-gradient(135deg, #efe4d1 0%, #f8f2e8 55%, #ece2d0 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        main {
            width: min(100%, 640px);
            background: rgba(255, 250, 242, 0.92);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 24px 80px rgba(65, 44, 14, 0.12);
            backdrop-filter: blur(10px);
        }
        h1 {
            margin-top: 0;
            font-size: clamp(2rem, 5vw, 3rem);
        }
        p {
            margin: 0 0 20px;
            color: #66594b;
        }
        form {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--line);
            font-size: 1rem;
            background: #fff;
        }
        button {
            border: 0;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1rem;
            cursor: pointer;
            background: var(--accent);
            color: white;
        }
        button:hover { background: var(--accent-dark); }
        #status {
            min-height: 24px;
            margin-bottom: 12px;
            color: #66594b;
        }
        #status.error { color: var(--danger); }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 10px;
        }
        li {
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: white;
        }
        .empty {
            padding: 18px;
            border: 1px dashed var(--line);
            border-radius: 14px;
            text-align: center;
            color: #7a6d5f;
        }
        @media (max-width: 640px) {
            form { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <main>
        <h1>Minhas Tarefas</h1>
        <p>Lista simples com frontend estatico, API Node.js e Postgres.</p>
        <form id="taskForm">
            <input type="text" id="taskInput" placeholder="Nova tarefa" maxlength="120" required>
            <button type="submit">Adicionar</button>
        </form>
        <div id="status" aria-live="polite"></div>
        <ul id="taskList"></ul>
    </main>

    <script>
        const API_BASE = '/api';
        const list = document.getElementById('taskList');
        const input = document.getElementById('taskInput');
        const statusEl = document.getElementById('status');
        const form = document.getElementById('taskForm');

        function setStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.className = isError ? 'error' : '';
        }

        function renderTasks(tasks) {
            if (!tasks.length) {
                list.innerHTML = '<li class="empty">Nenhuma tarefa cadastrada.</li>';
                return;
            }

            list.innerHTML = tasks.map((t) => `<li>${t.titulo}</li>`).join('');
        }

        async function loadTasks() {
            try {
                setStatus('Carregando tarefas...');
                const res = await fetch(`${API_BASE}/tarefas`);
                if (!res.ok) {
                    throw new Error('Falha ao carregar tarefas');
                }
                const tasks = await res.json();
                renderTasks(tasks);
                setStatus(`${tasks.length} tarefa(s) carregada(s).`);
            } catch (error) {
                renderTasks([]);
                setStatus('Nao foi possivel carregar as tarefas.', true);
            }
        }

        async function addTask() {
            const titulo = input.value.trim();
            if (!titulo) {
                setStatus('Digite uma tarefa antes de adicionar.', true);
                return;
            }

            const res = await fetch(`${API_BASE}/tarefas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo })
            });

            if (!res.ok) {
                throw new Error('Falha ao criar tarefa');
            }

            input.value = '';
            await loadTasks();
            setStatus('Tarefa adicionada com sucesso.');
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            try {
                await addTask();
            } catch (error) {
                setStatus('Nao foi possivel adicionar a tarefa.', true);
            }
        });

        loadTasks();
    </script>
</body>
</html>
