deploy:
  needs: build # Ou o nome do seu job de build/test
  runs-on: ubuntu-latest

  steps:
    - name: Deploy via SSH (Appleboy)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # Allan
          cd ~

          # Se o projeto não existe, clona. Se existe, pull.
          if [ ! -d "allan-app" ]; then
            git clone https://github.com/${{ github.repository }} allan-app
          fi

          cd allan-app
          git pull origin main
          docker compose pull
          docker compose up -d